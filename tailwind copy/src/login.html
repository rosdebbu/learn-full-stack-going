<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <link href="../output.css" rel="stylesheet" />
</head>
<body class="bg-gray-900 flex justify-center items-center min-h-screen">
    <div class="bg-gray-700 shadow-2xl rounded-lg p-8 w-full max-w-sm">
        <h2 class="text-center text-3xl text-white ml-6  font-bold">Login</h2>
        <form action="">
            <div class="mb-4">
                <label class="block text-sm font-medium bg-gray-600
                 border-gray-700 rounded-b-md text-white mb-2"
                for="">Email</label>

                <input class="w-full px-3 py-2 bg-gray-600
                rounded-r-md text-white focus:outline-none focus:ring-2 focus:ring-blue-500" 
                type="email" name="" id="" placeholder="Email">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium bg-gray-600
                 border-gray-700 rounded-b-md text-white mb-2" for="">Password</label>
                <input class="w-full px-3 py-2 bg-gray-600
                rounded-r-md text-white focus:outline-none focus:ring-2 focus:ring-blue-500" 
                type="password" name="" id="" placeholder="Password">
            </div>
            <button class="w-full bg-blue-500 hover:bg-blue-600 shadow-2xl text-white font-bold py-3 px-4 rounded focus:outline-none focus:ring-2"
             type="submit">Login
            </button>
        </form>
    </div>
</body>
</html>
